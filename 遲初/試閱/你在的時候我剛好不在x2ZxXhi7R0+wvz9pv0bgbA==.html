<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你在的時候，我剛好不在｜試閱版</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400&display=swap');

  :root {
    --ink: #1a1714;
    --ink-light: #3d3830;
    --ink-faint: #7a7068;
    --paper: #f5f0e8;
    --paper-warm: #ede7d8;
    --paper-mid: #e0d9cc;
    --accent: #8b6f5e;
    --accent-light: #b8967f;
    --rule: #c8bfb0;
    --cover-bg: #0e0c0a;
    --cover-mid: #1a1714;
    --cover-accent: #c4a882;
    --cover-faint: #6b5f54;
    --cover-rule: #2e2822;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }

  body {
    background: var(--cover-bg);
    color: var(--ink);
    font-family: 'Noto Serif TC', 'Georgia', serif;
    font-weight: 300;
    line-height: 2.1;
    overflow: hidden;
    height: 100vh;
  }

  /* ─── COVER ─────────────────────────────────────── */
  #cover {
    position: fixed;
    inset: 0;
    background: var(--cover-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.9s ease, visibility 0.9s ease;
  }

  #cover.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  #cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
  }

  #cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 45%, rgba(196,168,130,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .cover-inner {
    text-align: center;
    position: relative;
    z-index: 1;
    max-width: 380px;
    padding: 2rem;
    animation: coverFadeIn 1.6s ease both;
  }

  @keyframes coverFadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  .window-illustration {
    margin: 0 auto 2.8rem;
    width: 72px;
    height: 88px;
    opacity: 0.7;
  }

  .cover-top-rule {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--cover-faint));
    margin: 0 auto 2.8rem;
  }

  .cover-title {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 400;
    letter-spacing: 0.35em;
    line-height: 1.7;
    color: #e8ddd0;
    margin-bottom: 0.6rem;
  }

  /* Preview badge */
  .preview-badge {
    display: inline-block;
    margin-top: 0.8rem;
    padding: 0.25rem 0.9rem;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--cover-bg);
    background: var(--cover-accent);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 400;
  }

  .cover-divider {
    width: 32px;
    height: 1px;
    background: var(--cover-faint);
    margin: 2rem auto 2rem;
  }

  .cover-start-btn {
    display: inline-block;
    margin-top: 1rem;
    padding: 0.7rem 2.2rem;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--cover-accent);
    border: 1px solid var(--cover-faint);
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
    text-transform: uppercase;
  }

  .cover-start-btn:hover {
    border-color: var(--cover-accent);
    background: rgba(196,168,130,0.06);
    color: #e8ddd0;
  }

  /* ─── READER ─────────────────────────────────────── */
  #reader {
    position: fixed;
    inset: 0;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.8s ease 0.3s, visibility 0.8s ease 0.3s;
  }

  #reader.visible { opacity: 1; visibility: visible; }

  /* ─── NAV ─────────────────────────────────────── */
  nav {
    flex-shrink: 0;
    background: rgba(245, 240, 232, 0.97);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 50px;
    position: relative;
    z-index: 50;
    gap: 1rem;
  }

  .nav-title {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    font-weight: 300;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .nav-menu-btn {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-faint);
    font-size: 18px;
    padding: 0 0.3rem;
    flex-shrink: 0;
  }

  .nav-scroll-wrap {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .nav-scroll-wrap::-webkit-scrollbar { display: none; }

  .nav-chapters {
    display: flex;
    gap: 0;
    list-style: none;
    min-width: max-content;
  }

  .nav-chapters a {
    display: block;
    padding: 0 0.75rem;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-decoration: none;
    height: 50px;
    line-height: 50px;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    cursor: pointer;
  }

  .nav-chapters a:hover { color: var(--accent); }
  .nav-chapters a.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .nav-chapters a.locked {
    color: var(--rule);
    cursor: not-allowed;
    pointer-events: auto;
  }
  .nav-chapters a.locked:hover { color: var(--ink-faint); }

  .nav-dropdown {
    display: none;
    position: absolute;
    top: 50px;
    left: 0; right: 0;
    background: rgba(245,240,232,0.98);
    border-bottom: 1px solid var(--rule);
    z-index: 60;
    padding: 0.5rem 0;
  }
  .nav-dropdown.open { display: block; }
  .nav-dropdown a {
    display: block;
    padding: 0.55rem 2rem;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-decoration: none;
    cursor: pointer;
  }
  .nav-dropdown a:hover, .nav-dropdown a.active { color: var(--accent); }
  .nav-dropdown a.locked { color: var(--rule); cursor: not-allowed; }

  /* ─── PAGE CONTENT ─────────────────────────────── */
  .page-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 3.5rem 0 5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.45s ease, visibility 0.45s ease;
    pointer-events: none;
  }

  .page.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .page-inner {
    width: 100%;
    max-width: 640px;
    padding: 0 2.5rem;
  }

  /* ─── CHAPTER HEADER ─────────────────────────── */
  .chapter-header {
    text-align: center;
    padding-bottom: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .chapter-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
  }

  .chapter-title-num {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.25em;
    color: var(--ink-light);
    margin-bottom: 0.4rem;
  }

  .chapter-subtitle {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent-light);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    margin-top: 0.3rem;
  }

  .chapter-rule {
    width: 30px;
    height: 1px;
    background: var(--accent);
    margin: 1rem auto 0;
    opacity: 0.45;
  }

  .special-label {
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--accent-light);
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  /* ─── PROSE ──────────────────────────────────── */
  .prose p {
    margin-bottom: 1.6em;
    text-align: justify;
    text-justify: inter-ideographic;
    color: var(--ink);
    font-size: 15.5px;
    line-height: 2.15;
  }

  .prose p.indent { text-indent: 2em; }
  .prose p:first-child { text-indent: 0; }

  .scene-break {
    text-align: center;
    margin: 2.5em 0;
    color: var(--rule);
    letter-spacing: 0.5em;
    font-size: 13px;
  }

  /* ─── CHARACTER LIST ─────────────────────────── */
  .character-list {
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    padding: 2rem 2.5rem;
    margin-bottom: 3rem;
    font-size: 13.5px;
    line-height: 2.2;
    color: var(--ink-light);
  }

  .character-list-title {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }

  .character-list p { margin-bottom: 0.4em; }
  .character-list strong { color: var(--ink); font-weight: 500; }

  /* ─── PREVIEW BANNER (試閱提示) ───────────────── */
  .preview-banner {
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    padding: 0.9rem 1.5rem;
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
  }

  .preview-banner-icon {
    font-size: 14px;
    flex-shrink: 0;
  }

  .preview-banner strong {
    color: var(--accent);
    font-weight: 500;
  }

  /* ─── TOC PAGE ───────────────────────────────── */
  .toc-wrap {
    margin-top: 1rem;
  }

  .toc-title {
    font-size: 10px;
    letter-spacing: 0.45em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }

  .toc-list {
    list-style: none;
    border-top: 1px solid var(--rule);
  }

  .toc-list li {
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    padding: 0.85rem 0;
    gap: 1rem;
  }

  .toc-list li a {
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--ink-light);
    cursor: pointer;
    transition: color 0.2s;
    flex: 1;
  }

  .toc-list li a:hover { color: var(--accent); }

  .toc-list li.locked-item a {
    color: var(--ink-faint);
    cursor: not-allowed;
  }

  .toc-list li.locked-item a:hover { color: var(--ink-faint); }

  .toc-subtitle {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .toc-lock-icon {
    font-size: 11px;
    color: var(--rule);
  }

  .toc-preview-tag {
    font-size: 9.5px;
    padding: 0.15rem 0.5rem;
    background: var(--accent);
    color: white;
    letter-spacing: 0.15em;
    font-family: 'Noto Sans TC', sans-serif;
    border-radius: 1px;
    flex-shrink: 0;
  }

  /* ─── LOCKED PAGE ────────────────────────────── */
  .locked-page-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    padding: 3rem 1.5rem;
  }

  .locked-icon {
    font-size: 36px;
    margin-bottom: 1.5rem;
    opacity: 0.4;
  }

  .locked-title {
    font-size: 16px;
    letter-spacing: 0.25em;
    color: var(--ink-light);
    margin-bottom: 0.8rem;
  }

  .locked-desc {
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink-faint);
    line-height: 2;
    letter-spacing: 0.1em;
    max-width: 300px;
    margin-bottom: 2rem;
  }

  .locked-chapters-hint {
    font-size: 11px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--rule);
    letter-spacing: 0.15em;
    margin-bottom: 2.5rem;
    line-height: 2;
  }

  .unlock-btn {
    display: inline-block;
    padding: 0.7rem 2.4rem;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--paper);
    background: var(--accent);
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.3s;
    text-transform: uppercase;
  }

  .unlock-btn:hover { background: var(--accent-light); }

  /* ─── NAV ARROWS ─────────────────────────────── */
  .page-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2.5rem 0 0;
    border-top: 1px solid var(--rule);
    margin-top: 3rem;
    font-size: 11px;
    letter-spacing: 0.15em;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .page-nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-faint);
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    padding: 0.4rem 0;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .page-nav-btn:hover { color: var(--accent); }
  .page-nav-btn.hidden { visibility: hidden; }

  .page-nav-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* ─── READING PROGRESS BAR ───────────────────── */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.5;
    transition: width 0.3s;
    pointer-events: none;
  }

  /* ─── RESPONSIVE ─────────────────────────────── */
  @media (max-width: 640px) {
    nav { padding: 0 1rem; }
    .nav-scroll-wrap { display: none; }
    .nav-menu-btn { display: block; }
    .page-inner { padding: 0 1.4rem; }
    .page { padding: 2.5rem 0 4rem; }
    body { font-size: 15px; }
    .cover-title { letter-spacing: 0.2em; }
  }
</style>
</head>
<body>

<!-- ═══ COVER ═══════════════════════════════════════════ -->
<div id="cover">
  <div class="cover-inner">
    <div class="cover-top-rule"></div>

    <svg class="window-illustration" viewBox="0 0 72 88" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="6" width="60" height="74" rx="1" stroke="#c4a882" stroke-width="1.2" fill="none" opacity="0.6"/>
      <line x1="6" y1="78" x2="66" y2="78" stroke="#c4a882" stroke-width="1.2" opacity="0.5"/>
      <line x1="6" y1="43" x2="66" y2="43" stroke="#c4a882" stroke-width="0.8" opacity="0.4"/>
      <line x1="36" y1="6" x2="36" y2="78" stroke="#c4a882" stroke-width="0.8" opacity="0.4"/>
      <rect x="7" y="7" width="28" height="35" fill="rgba(196,168,130,0.04)"/>
      <rect x="37" y="7" width="28" height="35" fill="rgba(196,168,130,0.03)"/>
      <circle cx="51" cy="22" r="2" fill="#c4a882" opacity="0.55"/>
      <circle cx="51" cy="22" r="5" fill="#c4a882" opacity="0.1"/>
    </svg>

    <h1 class="cover-title">你在的時候<br>我剛好不在</h1>
    <p style="font-size:11px;letter-spacing:0.35em;color:var(--cover-faint);font-family:'Noto Sans TC',sans-serif;font-weight:300;margin-top:1.1rem;">遲初</p>
    <div class="preview-badge">試　閱　版</div>

    <div class="cover-divider"></div>

    <button class="cover-start-btn" onclick="enterReader()">進入試閱</button>
  </div>
</div>

<!-- ═══ READER ════════════════════════════════════════== -->
<div id="reader">

  <!-- NAV -->
  <nav>
    <span class="nav-title">你在的時候，我剛好不在｜試閱</span>
    <div class="nav-scroll-wrap">
      <ul class="nav-chapters" id="navList"></ul>
    </div>
    <button class="nav-menu-btn" onclick="toggleDropdown()" aria-label="章節選單">☰</button>
    <div class="progress-bar" id="progressBar"></div>
  </nav>
  <div class="nav-dropdown" id="navDropdown"></div>

  <!-- PAGES -->
  <div class="page-container" id="pageContainer"></div>

</div>

<script>
// ── Chapter data ─────────────────────────────────────────────────────────────
// PREVIEW: 目錄 + 序章 + 第一章 + 第二章 + 第三章 + 鎖定頁
const PREVIEW_COUNT = 5; // toc + prologue + ch1 + ch2 + ch3

const chapters = [
  {
    id: 'toc',
    nav: '目錄',
    locked: false,
    header: `
      <div class="chapter-header">
        <div class="special-label">目　錄</div>
        <div class="chapter-rule"></div>
      </div>`,
    content: `

        <div class="toc-title">Contents</div>

          <li>

          </li>
          <li class="locked-item">

          <li class="locked-item">

          </li>
          <li class="locked-item">
            <div style="flex:1"><a>第六章</a><div class="toc-subtitle">醫院走廊</div></div>

          <li class="locked-item">

            <span class="toc-lock-icon">🔒</span>
          </li>
          <li class="locked-item">
            <div style="flex:1"><a>第八章</a><div class="toc-subtitle">化療</div></div>
            <span class="toc-lock-icon">🔒</span>
          </li>
          <li class="locked-item">
            <div style="flex:1"><a>第九章</a><div class="toc-subtitle">等一個時機</div></div>
            <span class="toc-lock-icon">🔒</span>
          </li>
          <li class="locked-item">
            <div style="flex:1"><a>第十章</a><div class="toc-subtitle">訊號</div></div>
            <span class="toc-lock-icon">🔒</span>
          </li>
          <li class="locked-item">
            <div style="flex:1"><a>第十一章</a><div class="toc-subtitle">又一次，時機錯開</div></div>
            <span class="toc-lock-icon">🔒</span>
          </li>
          <li class="locked-item">
            <div style="flex:1"><a>第十二章</a><div class="toc-subtitle">廚房</div></div>
            <span class="toc-lock-icon">🔒</span>
          </li>
          <li class="locked-item">
            <div style="flex:1"><a>第十三章</a><div class="toc-subtitle">悶葫蘆</div></div>
            <span class="toc-lock-icon">🔒</span>
          </li>
          <li class="locked-item">
            <div style="flex:1"><a>尾聲</a></div>
            <span class="toc-lock-icon">🔒</span>
          </li>
        </ul>
      </div>`
  },
  {
    id: 'prologue',
    nav: '序章',
    locked: false,
    header: `
      <div class="chapter-header">
        <div class="special-label">序章</div>
        <div class="chapter-rule"></div>
      </div>`,
    content: `

// ── Build nav & pages ─────────────────────────────────────────────────────────
let currentIndex = 0;

function buildReader() {
  const navList = document.getElementById('navList');
  const navDropdown = document.getElementById('navDropdown');
  const container = document.getElementById('pageContainer');

  chapters.forEach((ch, i) => {
    // Desktop nav
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = ch.nav;
    a.href = '#';
    if (ch.locked) {
      a.classList.add('locked');
      a.addEventListener('click', e => { e.preventDefault(); goToPage(i); });
    } else {
      a.addEventListener('click', e => { e.preventDefault(); goToPage(i); });
    }
    li.appendChild(a);
    navList.appendChild(li);

    // Mobile dropdown
    const da = document.createElement('a');
    da.textContent = ch.nav;
    da.href = '#';
    if (ch.locked) da.classList.add('locked');
    da.addEventListener('click', e => {
      e.preventDefault();
      goToPage(i);
      closeDropdown();
    });
    navDropdown.appendChild(da);

    // Page
    const page = document.createElement('div');
    page.className = 'page';
    page.id = 'page-' + ch.id;

    const visiblePages = chapters.length;
    const prevLabel = i > 0 ? chapters[i-1].nav : '';
    const nextLabel = i < chapters.length-1 ? chapters[i+1].nav : '';

    page.innerHTML = `
      <div class="page-inner">
        ${ch.header}
        ${ch.content}
        <div class="page-nav">
          <button class="page-nav-btn prev-btn ${i === 0 ? 'hidden' : ''}" onclick="goToPage(${i-1})">
            ← ${prevLabel}
          </button>
          <span class="page-nav-label">${i+1} / ${visiblePages}</span>
          <button class="page-nav-btn next-btn ${i === chapters.length-1 ? 'hidden' : ''}" onclick="goToPage(${i+1})">
            ${nextLabel} →
          </button>
        </div>
      </div>`;
    container.appendChild(page);
  });

  goToPage(0);
}

function goToPage(index) {
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => p.classList.remove('active'));

  const navLinks = document.querySelectorAll('#navList a');
  navLinks.forEach(a => a.classList.remove('active'));

  const dropLinks = document.querySelectorAll('#navDropdown a');
  dropLinks.forEach(a => a.classList.remove('active'));

  pages[index].classList.add('active');
  navLinks[index].classList.add('active');
  dropLinks[index].classList.add('active');

  pages[index].scrollTop = 0;
  navLinks[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  currentIndex = index;
  updateProgress();
}

function updateProgress() {
  const bar = document.getElementById('progressBar');
  const pct = (currentIndex / (chapters.length - 1)) * 100;
  bar.style.width = pct + '%';
}

function toggleDropdown() {
  document.getElementById('navDropdown').classList.toggle('open');
}

function closeDropdown() {
  document.getElementById('navDropdown').classList.remove('open');
}

function enterReader() {
  document.getElementById('cover').classList.add('hidden');
  document.body.style.overflow = '';
  document.getElementById('reader').classList.add('visible');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('reader').classList.contains('visible')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentIndex < chapters.length - 1) goToPage(currentIndex + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (currentIndex > 0) goToPage(currentIndex - 1);
  }
});

buildReader();
</script>
