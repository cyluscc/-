<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你在的時候，我剛好不在</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400&display=swap');

  :root {
    --ink: #1a1714;
    --ink-light: #3d3830;
    --ink-faint: #7a7068;
    --paper: #f5f0e8;
    --paper-warm: #ede7d8;
    --paper-mid: #e0d9cc;
    --accent: #8b6f5e;
    --accent-light: #b8967f;
    --rule: #c8bfb0;

    /* Dark cover palette */
    --cover-bg: #0e0c0a;
    --cover-mid: #1a1714;
    --cover-accent: #c4a882;
    --cover-faint: #6b5f54;
    --cover-rule: #2e2822;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }

  body {
    background: var(--cover-bg);
    color: var(--ink);
    font-family: 'Noto Serif TC', 'Georgia', serif;
    font-weight: 300;
    line-height: 2.1;
    overflow: hidden;
    height: 100vh;
  }

  /* ─── COVER ─────────────────────────────────────── */
  #cover {
    position: fixed;
    inset: 0;
    background: var(--cover-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.9s ease, visibility 0.9s ease;
  }

  #cover.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  /* Grain texture overlay */
  #cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
  }

  /* Radial glow */
  #cover::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 45%, rgba(196,168,130,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .cover-inner {
    text-align: center;
    position: relative;
    z-index: 1;
    max-width: 380px;
    padding: 2rem;
    animation: coverFadeIn 1.6s ease both;
  }

  @keyframes coverFadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  /* Window illustration */
  .window-illustration {
    margin: 0 auto 2.8rem;
    width: 72px;
    height: 88px;
    opacity: 0.7;
  }

  /* Thin top rule */
  .cover-top-rule {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--cover-faint));
    margin: 0 auto 2.8rem;
  }

  .cover-title {
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 400;
    letter-spacing: 0.35em;
    line-height: 1.7;
    color: #e8ddd0;
    margin-bottom: 0.6rem;
  }

  .cover-divider {
    width: 32px;
    height: 1px;
    background: var(--cover-faint);
    margin: 2rem auto 2rem;
  }

  .cover-start-btn {
    display: inline-block;
    margin-top: 1rem;
    padding: 0.7rem 2.2rem;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--cover-accent);
    border: 1px solid var(--cover-faint);
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
    text-transform: uppercase;
  }

  .cover-start-btn:hover {
    border-color: var(--cover-accent);
    background: rgba(196,168,130,0.06);
    color: #e8ddd0;
  }

  /* ─── READER ─────────────────────────────────────── */
  #reader {
    position: fixed;
    inset: 0;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.8s ease 0.3s, visibility 0.8s ease 0.3s;
  }

  #reader.visible {
    opacity: 1;
    visibility: visible;
  }

  /* ─── NAV ─────────────────────────────────────── */
  nav {
    flex-shrink: 0;
    background: rgba(245, 240, 232, 0.97);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 50px;
    position: relative;
    z-index: 50;
    gap: 1rem;
  }

  .nav-title {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    font-weight: 300;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Hamburger for mobile */
  .nav-menu-btn {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-faint);
    font-size: 18px;
    padding: 0 0.3rem;
    flex-shrink: 0;
  }

  .nav-scroll-wrap {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .nav-scroll-wrap::-webkit-scrollbar { display: none; }

  .nav-chapters {
    display: flex;
    gap: 0;
    list-style: none;
    min-width: max-content;
  }

  .nav-chapters a {
    display: block;
    padding: 0 0.75rem;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-decoration: none;
    height: 50px;
    line-height: 50px;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    cursor: pointer;
  }

  .nav-chapters a:hover { color: var(--accent); }
  .nav-chapters a.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Dropdown nav for mobile */
  .nav-dropdown {
    display: none;
    position: absolute;
    top: 50px;
    left: 0; right: 0;
    background: rgba(245,240,232,0.98);
    border-bottom: 1px solid var(--rule);
    z-index: 60;
    padding: 0.5rem 0;
  }
  .nav-dropdown.open { display: block; }
  .nav-dropdown a {
    display: block;
    padding: 0.55rem 2rem;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-decoration: none;
    cursor: pointer;
  }
  .nav-dropdown a:hover, .nav-dropdown a.active { color: var(--accent); }

  /* ─── PAGE CONTENT ─────────────────────────────── */
  .page-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 3.5rem 0 5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.45s ease, visibility 0.45s ease;
    pointer-events: none;
  }

  .page.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .page-inner {
    width: 100%;
    max-width: 640px;
    padding: 0 2.5rem;
  }

  /* ─── CHAPTER HEADER ─────────────────────────── */
  .chapter-header {
    text-align: center;
    padding-bottom: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .chapter-label {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
  }

  .chapter-title-num {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.25em;
    color: var(--ink-light);
    margin-bottom: 0.4rem;
  }

  .chapter-subtitle {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent-light);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    margin-top: 0.3rem;
  }

  .chapter-rule {
    width: 30px;
    height: 1px;
    background: var(--accent);
    margin: 1rem auto 0;
    opacity: 0.45;
  }

  /* Special: prologue / epilogue label */
  .special-label {
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--accent-light);
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  /* ─── PROSE ──────────────────────────────────── */
  .prose p {
    margin-bottom: 1.6em;
    text-align: justify;
    text-justify: inter-ideographic;
    color: var(--ink);
    font-size: 15.5px;
    line-height: 2.15;
  }

  .prose p.indent { text-indent: 2em; }
  .prose p:first-child { text-indent: 0; }

  .scene-break {
    text-align: center;
    margin: 2.5em 0;
    color: var(--rule);
    letter-spacing: 0.5em;
    font-size: 13px;
  }

  /* ─── CHARACTER LIST ─────────────────────────── */
  .character-list {
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    padding: 2rem 2.5rem;
    margin-bottom: 3rem;
    font-size: 13.5px;
    line-height: 2.2;
    color: var(--ink-light);
  }

  .character-list-title {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }

  .character-list p { margin-bottom: 0.4em; }
  .character-list strong { color: var(--ink); font-weight: 500; }

  /* ─── EPILOGUE ───────────────────────────────── */
  .epilogue-header {
    text-align: center;
    padding-bottom: 2.5rem;
  }

  /* ─── AUTHOR NOTE ────────────────────────────── */
  .authors-note {
    margin-top: 3.5rem;
    padding: 2.2rem 2.5rem;
    background: var(--paper-warm);
    border-left: 2px solid var(--accent);
    font-size: 13.5px;
    line-height: 2.0;
    color: var(--ink-faint);
  }

  .authors-note p {
    margin-bottom: 0.8em;
    font-style: italic;
  }
  .authors-note p:last-child { margin-bottom: 0; }

  /* ─── END MARK ───────────────────────────────── */
  .end-mark {
    text-align: center;
    padding: 3rem 0 1rem;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* ─── NAV ARROWS ─────────────────────────────── */
  .page-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2.5rem 0 0;
    border-top: 1px solid var(--rule);
    margin-top: 3rem;
    font-size: 11px;
    letter-spacing: 0.15em;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .page-nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-faint);
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    padding: 0.4rem 0;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .page-nav-btn:hover { color: var(--accent); }
  .page-nav-btn.hidden { visibility: hidden; }

  .page-nav-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* ─── SCENE DIVIDER (inside same page) ───────── */
  .inline-divider {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin: 3.5rem 0;
  }
  .inline-divider::before,
  .inline-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  .inline-divider span {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* ─── RESPONSIVE ─────────────────────────────── */
  @media (max-width: 640px) {
    nav { padding: 0 1rem; }
    .nav-scroll-wrap { display: none; }
    .nav-menu-btn { display: block; }
    .page-inner { padding: 0 1.4rem; }
    .page { padding: 2.5rem 0 4rem; }
    body { font-size: 15px; }
    .cover-title { letter-spacing: 0.2em; }
  }
</style>
</head>
<body>

<!-- ═══ COVER ═══════════════════════════════════════════ -->
<div id="cover">
  <div class="cover-inner">
    <div class="cover-top-rule"></div>

    <svg class="window-illustration" viewBox="0 0 72 88" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="6" width="60" height="74" rx="1" stroke="#c4a882" stroke-width="1.2" fill="none" opacity="0.6"/>
      <line x1="6" y1="78" x2="66" y2="78" stroke="#c4a882" stroke-width="1.2" opacity="0.5"/>
      <line x1="6" y1="43" x2="66" y2="43" stroke="#c4a882" stroke-width="0.8" opacity="0.4"/>
      <line x1="36" y1="6" x2="36" y2="78" stroke="#c4a882" stroke-width="0.8" opacity="0.4"/>
      <rect x="7" y="7" width="28" height="35" fill="rgba(196,168,130,0.04)"/>
      <rect x="37" y="7" width="28" height="35" fill="rgba(196,168,130,0.03)"/>
      <circle cx="51" cy="22" r="2" fill="#c4a882" opacity="0.55"/>
      <circle cx="51" cy="22" r="5" fill="#c4a882" opacity="0.1"/>
    </svg>

    <h1 class="cover-title">你在的時候<br>我剛好不在</h1>
    <p style="font-size:11px;letter-spacing:0.35em;color:var(--cover-faint);font-family:'Noto Sans TC',sans-serif;font-weight:300;margin-top:1.1rem;">遲初</p>

    <div class="cover-divider"></div>

    <button class="cover-start-btn" onclick="enterReader()">進入閱讀</button>
  </div>
</div>

<!-- ═══ READER ════════════════════════════════════════== -->
<div id="reader">

  <!-- NAV -->
  <nav>
    <span class="nav-title">你在的時候，我剛好不在</span>
    <div class="nav-scroll-wrap">
      <ul class="nav-chapters" id="navList">
        <!-- Filled by JS -->
      </ul>
    </div>
    <button class="nav-menu-btn" onclick="toggleDropdown()" aria-label="章節選單">☰</button>
  </nav>
  <div class="nav-dropdown" id="navDropdown">
    <!-- Filled by JS -->
  </div>

  <!-- PAGES -->
  <div class="page-container" id="pageContainer">
    <!-- Filled by JS -->
  </div>

</div>

<script>
// ── Chapter data ──────────────────────────────────────────────────────────────
const chapters = [
  {
    id: 'prologue',
    nav: '序章',
    header: `
      <div class="chapter-header">
        <div class="special-label">序章</div>
        <div class="chapter-rule"></div>
      </div>`,
    content: `
      <div class="character-list">
        <div class="character-list-title">人物</div>
        <p><strong>沈嶼</strong>——男主。31歲，建築師。沉默，記性好，習慣把話放著，等一個他說不清楚的時機。</p>
        <p><strong>裴兮沄</strong>——女主。30歲，兒科醫生。說話快，笑得多，但最難說出口的事，她永遠藏得最深。</p>
        <p><strong>沈母</strong>——沈嶼的母親。最早知道一切的人，也是帶走一個秘密的人。</p>
        <p style="margin-top:0.8em; font-size:13px; color: var(--ink-faint);">他們住在同一條巷子，從五歲開始，到三十歲，整整二十五年。</p>
      </div>
      <div class="prose">
        <p>那條巷子很窄，兩排房子對著對著，走到底是一堵牆，牆上掛了幾年的黃曆，後來黃曆換成別的東西，後來那堵牆也重新刷過，白了，但還是那堵牆。</p>
        <p class="indent">沈嶼和裴兮沄在那條巷子住了二十五年。</p>
        <p class="indent">二十五年裡，他們說過很多話，但有一句話他們誰都沒說。</p>
        <p class="indent">這個故事說的是那一句話，和那一句話前後的二十五年。</p>
      </div>`
  },
  {
    id: 'ch1',
    nav: '第一章',
    header: `
      <div class="chapter-header">
        <div class="chapter-label">第一章</div>
        <div class="chapter-title-num">壞掉的燈</div>
        <div class="chapter-rule"></div>
      </div>`,
    content: `
      <div class="prose">
        <p>沈嶼五歲那年，裴家搬進了巷子對面。</p>
        <p class="indent">他是從窗戶縫裡看到的——一輛搬家車，幾個大人，然後一個紮著兩條辮子的女孩從車上跳下來，摔了一跤，沒哭，拍拍膝蓋站起來，仰著頭看那棟新房子，表情像是在勘察她的新領地。</p>
        <p class="indent">他媽在旁邊說：「去跟人家打招呼。」</p>
        <p class="indent">他搖頭。</p>
        <p class="indent">他媽說：「去，就說你好，我叫沈嶼，我家在對面。」</p>
        <p class="indent">他站在門口說了，那個女孩轉過頭，打量了他兩秒，說：「我叫裴兮沄。你家的燈壞了一個，我看到了。」</p>
        <p class="indent">沈嶼轉頭看，三樓陽台燈確實壞了一顆。</p>
        <p class="indent">他說：「壞很久了。」</p>
        <p class="indent">裴兮沄說：「那你爸為什麼不修。」</p>
        <p class="indent">他沒說話。</p>
        <p class="indent">裴兮沄好像意識到什麼，沒有繼續問，只說：「那你去讓你媽修。」</p>
        <p class="indent">然後轉身走了。</p>
        <p class="indent">那是他們第一次說話。簡短，沒有溫度，完全不像個開頭，但後來的二十五年，都從那顆壞掉的陽台燈開始算。</p>
      </div>`
  },
  {
    id: 'ch2',
    nav: '第二章',
    header: `
      <div class="chapter-header">
        <div class="chapter-label">第二章</div>
        <div class="chapter-title-num">記性好的人</div>
        <div class="chapter-rule"></div>
      </div>`,
    content: `
      <div class="prose">
        <p>他們在同一個小學，同一個班，後排靠窗的座位先後坐過彼此。</p>
        <p class="indent">裴兮沄成績好，嘴快，喜歡在老師說錯的時候舉手訂正，因此被班上一半的人又敬又怕。沈嶼成績也好，但安靜，那種坐在後排讓人記不住臉的安靜，除了裴兮沄。</p>
        <p class="indent">裴兮沄記得他。</p>
        <p class="indent">後來她說過，她記得他是因為他記性太好了，「你只要聽過一次就記得，那種人很少見。」</p>
        <p class="indent">她那時候是帶著點欽佩說的，沈嶼沒有回答，因為他也說不清自己為什麼記性那麼好——他只是習慣把那些值得記的東西，靜靜地放著，它們自然就在了。</p>
        <p class="indent">比如裴兮沄左手腕有一個小疤，她說是六歲騎腳踏車摔的。比如她討厭香菜，但不討厭香菜入菜的味道，只討厭原葉的氣味。比如她哭的時候不出聲，眼睛會先紅，然後就過去了，她不讓眼淚掉下來。</p>
        <p class="indent">這些他都記得，但他從未說過他記得。</p>
        <p class="indent">小學六年級，班上有男生喜歡裴兮沄，寫了一封信塞進她課桌，她拿出來看了，然後折好，課後走到對方座位，說：「謝謝，但不行。」</p>
        <p class="indent">乾脆，沒有殘忍，但清楚。</p>
        <p class="indent">走回去的路上她經過沈嶼的位子，低聲說：「你看什麼，收好你的表情。」</p>
        <p class="indent">他沒什麼表情，但她這樣說了，他就移開視線，繼續看書。</p>
        <p class="indent">他後來想，那個時候他心裡有個什麼東西動了一下，但他六年級，他不知道那叫什麼，只是記住了。</p>
      </div>`
  },
  {
    id: 'ch3',
    nav: '第三章',
    header: `
      <div class="chapter-header">
        <div class="chapter-label">第三章</div>
        <div class="chapter-title-num">巷子緣分</div>
        <div class="chapter-rule"></div>
      </div>`,
    content: `
      <div class="prose">

        <p class="indent">她說：「你五歲的時候就壞了，你現在還沒修。」</p>
        <p class="indent">他仰頭看，說：「好像是。」</p>
        <p class="indent">她說：「你去修。」</p>
        <p class="indent">他說：「好。」</p>
        <p class="indent">他說這個「好」的時候，她聽到他聲音裡有什麼東西，是那種終於放下來的重量，不是沉的，是穩的，是那種踩得住地面的感覺。</p>
        <p class="indent">她說：「沈嶼。」</p>
        <p class="indent">他說：「嗯。」</p>
        <p class="indent">她說：「以後說話不要再等時機了。」</p>
        <p class="indent">他說：「好，但妳也是。」</p>
        <p class="indent">她說：「我先說了的，你記著。」</p>
        <p class="indent">他說：「記著，我記性好，妳說的每一句話我都記著。」</p>
        <p class="indent">她轉頭看他，他站在巷子裡，秋天的光把他的輪廓照得很清楚，她想，二十五年，你一直站在對面，這麼近，這麼遠，我以為永遠都是這樣了。</p>
        <p class="indent">原來不是。</p>
        <p class="indent">原來只是時機，一直沒有對，直到這一次，她先說了，他接住了。</p>
        <p class="indent">她說：「進去吧，天涼了。」</p>
        <p class="indent">他說：「嗯。」</p>
        <p class="indent">他們走進各自的家，那條巷子在傍晚的光裡很靜，對面和對面，燈亮著，那個壞掉的陽台燈過了幾天被修好了，整條巷子的燈，第一次全亮。</p>
      </div>

      <div class="end-mark">——　全文完　——</div>

      <div class="authors-note">
        <p>這不是芭樂。他們在一起了，但代價是二十五年——二十五年各自錯過，各自等，各自拿最笨的方式保護最想靠近的人。裴兮沄用生病那一年做了最後的逼迫：她設下期限，逼自己說出口，但依然差一點又錯開。</p>
        <p>意難平不在結局，在那些時機——</p>
        <p>高一巷口，她問你喜歡過誰，他說說了也沒用。醫院走廊，她說你別讓我覺得沒用，他說知道了。巷子相遇，她開口說「我有一件事」，他的電話響了。</p>
        <p>每一次都差那麼一步。</p>
        <p>但他們最終在場了，同時，說了，這一次沒有錯開。</p>
      </div>`
  }
];

// ── Build nav & pages ─────────────────────────────────────────────────────────
let currentIndex = 0;

function buildReader() {
  const navList = document.getElementById('navList');
  const navDropdown = document.getElementById('navDropdown');
  const container = document.getElementById('pageContainer');

  chapters.forEach((ch, i) => {
    // Desktop nav item
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = ch.nav;
    a.href = '#';
    a.addEventListener('click', e => { e.preventDefault(); goToPage(i); });
    li.appendChild(a);
    navList.appendChild(li);

    // Mobile dropdown item
    const da = document.createElement('a');
    da.textContent = ch.nav;
    da.href = '#';
    da.addEventListener('click', e => {
      e.preventDefault();
      goToPage(i);
      closeDropdown();
    });
    navDropdown.appendChild(da);

    // Page
    const page = document.createElement('div');
    page.className = 'page';
    page.id = 'page-' + ch.id;
    page.innerHTML = `
      <div class="page-inner">
        ${ch.header}
        ${ch.content}
        <div class="page-nav">
          <button class="page-nav-btn prev-btn ${i === 0 ? 'hidden' : ''}" onclick="goToPage(${i-1})">
            ← ${i > 0 ? chapters[i-1].nav : ''}
          </button>
          <span class="page-nav-label">${i+1} / ${chapters.length}</span>
          <button class="page-nav-btn next-btn ${i === chapters.length-1 ? 'hidden' : ''}" onclick="goToPage(${i+1})">
            ${i < chapters.length-1 ? chapters[i+1].nav : ''} →
          </button>
        </div>
      </div>`;
    container.appendChild(page);
  });

  goToPage(0);
}

function goToPage(index) {
  // Hide current
  const pages = document.querySelectorAll('.page');
  pages.forEach(p => p.classList.remove('active'));

  const navLinks = document.querySelectorAll('#navList a');
  navLinks.forEach(a => a.classList.remove('active'));

  const dropLinks = document.querySelectorAll('#navDropdown a');
  dropLinks.forEach(a => a.classList.remove('active'));

  // Show new
  pages[index].classList.add('active');
  navLinks[index].classList.add('active');
  dropLinks[index].classList.add('active');

  // Scroll to top of new page
  pages[index].scrollTop = 0;

  // Scroll nav link into view
  navLinks[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  currentIndex = index;
}

function toggleDropdown() {
  document.getElementById('navDropdown').classList.toggle('open');
}

function closeDropdown() {
  document.getElementById('navDropdown').classList.remove('open');
}

function enterReader() {
  document.getElementById('cover').classList.add('hidden');
  document.body.style.overflow = '';
  const reader = document.getElementById('reader');
  reader.classList.add('visible');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('reader').classList.contains('visible')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentIndex < chapters.length - 1) goToPage(currentIndex + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (currentIndex > 0) goToPage(currentIndex - 1);
  }
});

buildReader();
</script>
